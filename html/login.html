<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <!-- Bootstrap (icon) -->
    <link rel="stylesheet" href="../bsicon/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>
    <div class="login-box">
      <div class="login-title">Đăng nhập</div>
      <div class="login-sub">Nhập email và mật khẩu của bạn</div>

      <form id="loginForm">
        <div class="mb-3">
          <input type="email" id="email" class="form-control" placeholder="Email" />
          <small class="text-danger" id="emailError">*</small>
        </div>

        <div class="mb-3">
          <input type="password" id="password" class="form-control" placeholder="Mật khẩu" />
          <small class="text-danger" id="passwordError">*</small>
        </div>

        <button type="submit" class="btn btn-login w-100">Đăng nhập</button>
      </form>

      <div class="extra-link mt-2">
        <a href="#">Quên mật khẩu?</a>
      </div>

      <div class="login-divider">Hoặc đăng nhập bằng</div>

      <div class="d-grid gap-2">
        <button id="btnGoogle" class="btn btn-danger w-75 mx-auto">
          <i class="bi bi-google"></i> Đăng nhập Google
        </button>

        <button id="btnFacebook" class="btn btn-primary w-75 mx-auto">
          <i class="bi bi-facebook"></i> Đăng nhập Facebook
        </button>
      </div>

      <div class="extra-link">
        Khách hàng mới?
        <a href="register.html">Tạo tài khoản</a>
      </div>
    </div>

    <!-- js -->
    <script src="../js/login.js"></script>
  </body>
</html>
