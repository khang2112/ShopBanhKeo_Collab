<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng ký</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="../css/bootstrap.min.css" />

    <!-- Icon -->
    <link rel="stylesheet" href="../bsicon/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="../css/register.css" />
  </head>

  <body>
    <div class="register-container">
      <h2 class="title">Đăng ký tài khoản</h2>
      <form id="formRegister">
        <div class="mb-3">
          <label class="form-label">Tên đăng nhập</label>
          <input type="text" id="username" class="form-control" />
          <small id="errUsername" class="text-danger">*</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" id="password" class="form-control" />
          <small id="errPassword" class="text-danger">*</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Xác nhận mật khẩu</label>
          <input type="password" id="repassword" class="form-control" />
          <small id="errRepassword" class="text-danger">*</small>
        </div>

        <h4 class="title">THÔNG TIN CÁ NHÂN</h4>
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Họ</label>
            <input type="text" id="ho" class="form-control"/>
            <small id="errHo" class="text-danger">*</small>
          </div>

          <div class="col">
            <label class="form-label">Tên</label>
            <input type="text" id="ten" class="form-control"/>
            <small id="errTen" class="text-danger">*</small>
          </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Ngày sinh</label>
            <input type="date" id="ngaysinh" class="form-control" />
            <small id="errNgaySinh" class="text-danger">*</small>
          </div>

          <div class="mb-3">
            <label class="form-label d-block">Giới tính</label>
            <input type="radio" name="gender" id="nam" /> Nam
            <input type="radio" name="gender" id="nu" /> Nữ
            <small id="errGender" class="text-danger">*</small>
          </div>

          <div class="mb-3">
            <label class="form-label">Địa chỉ</label>
            <input type="text" id="diachi" class="form-control" />
            <small id="errDiaChi" class="text-danger">*</small>
          </div>

          <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <input type="text" id="sdt" class="form-control" />
            <small id="errSDT" class="text-danger">*</small>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" />
            <small id="errEmail" class="text-danger">*</small>
          </div>

          <button type="submit" class="btn btn-pink w-100">Đăng ký</button>
      </form>

      <div class="register-divider">hoặc</div>

      <div class="d-grid gap-2">
        <button type="button" id="btnGoogle" class="btn btn-danger social-btn w-75 mx-auto">
          <i class="bi bi-google"></i> Đăng nhập Google
        </button>

        <button type="button" id="btnFacebook" class="btn btn-primary social-btn w-75 mx-auto">
          <i class="bi bi-facebook"></i> Đăng nhập Facebook
        </button>
      </div>

      <div class="extra-link">
        Bạn đã có tài khoản?
        <a href="login.html">Đăng nhập ngay</a>
      </div>
    </div>

    <!--js-->
    <script src="../js/register.js"></script>
  </body>
</html>
